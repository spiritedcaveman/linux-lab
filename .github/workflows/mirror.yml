name: Linux Lab Sync
on:
  schedule:
    - cron: "*/5 * * * *" # Every 5 minutes
  workflow_dispatch:      # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Force Sync All Tags
        run: |
          git clone --mirror https://github.com/torvalds/linux.git kernel.git
          cd kernel.git
          git remote add codeberg https://${{ secrets.CODEBERG_TOKEN }}@codeberg.org/spiritedcaveman/linux-lab.git
          
          # Force push all tags specifically
          git push --force codeberg --tags
          
          # Then sync the branches
          git push --force codeberg master
